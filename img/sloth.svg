<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- branch -->
  <path d="M8 18 Q60 28 112 16" stroke="#8B7355" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M108 16 L118 13" stroke="#8B7355" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- left arm wrapped over branch -->
  <path d="M42 48 Q34 34 42 22" stroke="#C4956A" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M42 48 Q34 34 42 22" stroke="#E8C99B" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- right arm wrapped over branch -->
  <path d="M78 48 Q86 34 78 22" stroke="#C4956A" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M78 48 Q86 34 78 22" stroke="#E8C99B" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35"/>
  <!-- left claw on branch -->
  <path d="M42 22 L38 14 M42 22 L42 13 M42 22 L46 15" stroke="#E8C99B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- right claw on branch -->
  <path d="M78 22 L74 14 M78 22 L78 13 M78 22 L82 15" stroke="#E8C99B" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- body -->
  <ellipse cx="60" cy="85" rx="32" ry="40" fill="#C4956A"/>
  <!-- belly stripe -->
  <ellipse cx="60" cy="90" rx="20" ry="24" fill="#E8C99B"/>
