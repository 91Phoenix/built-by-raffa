  <ellipse cx="46" cy="122" rx="12" ry="7" fill="#C4956A"/>
  <!-- right leg -->
  <ellipse cx="74" cy="122" rx="12" ry="7" fill="#C4956A"/>
  <!-- left toes -->
  <circle cx="38" cy="122" r="2.5" fill="#A67850"/>
  <circle cx="44" cy="124" r="2.5" fill="#A67850"/>
  <circle cx="50" cy="124" r="2.5" fill="#A67850"/>
  <!-- right toes -->
  <circle cx="66" cy="124" r="2.5" fill="#A67850"/>
  <circle cx="72" cy="124" r="2.5" fill="#A67850"/>
  <circle cx="78" cy="122" r="2.5" fill="#A67850"/>
  <!-- head -->
  <circle cx="60" cy="48" r="24" fill="#C4956A"/>
  <!-- face mask -->
  <ellipse cx="60" cy="52" rx="16" ry="14" fill="#E8C99B"/>
  <!-- eyes -->
  <circle cx="52" cy="48" r="4" fill="#2c2c2c"/>
  <circle cx="68" cy="48" r="4" fill="#2c2c2c"/>
  <!-- eye highlights -->
  <circle cx="53.5" cy="46.5" r="1.5" fill="#ffffff"/>
  <circle cx="69.5" cy="46.5" r="1.5" fill="#ffffff"/>
  <!-- sleepy lids -->
  <path d="M48 46 Q52 43.5 56 46" stroke="#2c2c2c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M64 46 Q68 43.5 72 46" stroke="#2c2c2c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="60" cy="54" rx="2.5" ry="2" fill="#A67850"/>
  <!-- smile -->
  <path d="M55 58 Q60 62 65 58" stroke="#A67850" stroke-width="1.2" fill="none" stroke-linecap="round"/>
